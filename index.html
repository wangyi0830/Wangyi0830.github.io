<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wangyi's Homepage</title>
  
  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="#" class="logo">
        <span class="logo-text">YiYi</span>
        <div class="logo-dot"></div>
      </a>
      
      <div class="nav-actions">
        <div class="nav-links">
          <a href="#projects" data-i18n="nav.projects">项目</a>
          <a href="#campus-experiences" data-i18n="nav.campusexperiences">实习经历</a>
          <a href="#timeline" data-i18n="nav.timeline">时间轴</a>
          <a href="#skills" data-i18n="nav.skills">专业技能</a>
          <a href="#self-introduction" data-i18n="nav.self-introduction">自我介绍</a>
        </div>
        
        <div class="nav-controls">
          <button class="control-btn lang-toggle" aria-label="Toggle Language">中文</button>
          <button class="control-btn theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-sun sun-icon"></i>
            <i class="fas fa-moon moon-icon"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <section id="intro" class="intro">
    <div class="bg-decoration"></div>
    <div class="container flex-center column">
      <div class="avatar-container">
        <img src="assets/images/Avatar.jpg" alt="Avatar" class="avatar" data-i18n="intro.avatarAlt">
        <div class="avatar-glow"></div>
      </div>
      <h1 class="gradient-text" data-i18n="intro.title">Hello, I'm Lain-Ego</h1>
      <p class="subtitle" data-i18n="intro.desc">...</p>
      <div class="intro-contact-links" aria-label="Social Links"></div>
    </div>
  </section>

  <section id="projects" class="section-padding">
    <div class="container">
      <h2 data-i18n="projects.title">My Projects</h2>
      <div class="projects-grid"></div>
    </div>
  </section>

  <section id="opensource" class="section-padding">
    <div class="container">
      <h2 data-i18n="opensource.title">Open Source Contributions</h2>
      <div class="opensource-grid"></div>
    </div>
  </section>

  <section id="timeline" class="section-padding">
    <div class="container">
      <h2 data-i18n="timeline.title">Timeline</h2>
      <div class="timeline-container"></div>
    </div>
  </section>

  <section id="skills" class="section-padding">
    <div class="container">
      <h2 data-i18n="skills.title">Tech Stack</h2>
      <div class="skills-wrapper"></div>
    </div>
  </section>

  <footer data-i18n="footer.copyright">© 2026 王一. All rights reserved.</footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
